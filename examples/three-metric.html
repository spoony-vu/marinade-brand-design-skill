<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Three-Metric Slide — Marinade Brand Example</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mn-dark: #151A1A;
    --mn-white: #FFFFFF;
    --mn-deep-teal: #194544;
    --mn-brand-teal: #308D8A;
    --mn-light-teal: #94C9C8;
    --mn-body-secondary: #323A38;
    --mn-muted-text: #7F7F7F;
    --mn-near-white: #F3F3F3;
    --mn-slide-width: 1920px;
    --mn-slide-height: 1080px;
    --mn-margin-x: 80px;
    --mn-margin-y: 82px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: var(--mn-slide-width);
    height: var(--mn-slide-height);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--mn-white);
    color: var(--mn-dark);
    padding: var(--mn-margin-y) var(--mn-margin-x);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .header-logo {
    position: absolute;
    top: var(--mn-margin-y);
    right: var(--mn-margin-x);
    height: 32px;
    opacity: 0.7;
  }

  h2 {
    font-size: 54px;
    font-weight: 600;
    color: var(--mn-deep-teal);
    line-height: 1.1;
    max-width: 800px;
    text-wrap: balance;
  }

  .description {
    font-size: 27px;
    font-weight: 400;
    color: var(--mn-body-secondary);
    margin-top: 16px;
    max-width: 700px;
    line-height: 1.4;
  }

  .metrics-row {
    display: flex;
    gap: 80px;
    margin-top: auto;
    margin-bottom: 40px;
    padding-top: 60px;
  }

  .metric-block {
    flex: 1;
    max-width: 480px;
    padding: 40px;
    border: 1px solid rgba(48, 141, 138, 0.15);
    border-radius: 12px;
  }

  .metric-value {
    font-size: 64px;
    font-weight: 600;
    color: var(--mn-dark);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .metric-label {
    font-size: 21px;
    font-weight: 400;
    color: var(--mn-body-secondary);
    margin-top: 12px;
    line-height: 1.4;
  }

  .metric-change {
    font-size: 18px;
    font-weight: 600;
    color: var(--mn-brand-teal);
    margin-top: 8px;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--mn-brand-teal);
    margin: 32px 0;
  }
</style>
</head>
<body>
<!--
  ARCHETYPE: 6. Three-Metric Layout
  - White background, dark text
  - Title in deep-teal, description below
  - 3 metric blocks with large numbers (tabular-nums)
  - Subtle teal borders on cards
  - Brand-teal for change indicators
-->
<div class="slide">
  <img class="header-logo" src="../assets/logos/marinade-logo.svg" alt="Marinade Finance" onerror="this.style.display='none'">

  <h2>Protocol performance</h2>
  <div class="description">Key metrics demonstrating sustained growth across Q4 2025</div>

  <div class="divider"></div>

  <div class="metrics-row">
    <div class="metric-block">
      <div class="metric-value">$2.1B</div>
      <div class="metric-label">Total value locked across all staking products</div>
      <div class="metric-change">+34% QoQ</div>
    </div>
    <div class="metric-block">
      <div class="metric-value">8.81%</div>
      <div class="metric-label">Current annualized yield for mSOL holders</div>
      <div class="metric-change">+0.4% vs Q3</div>
    </div>
    <div class="metric-block">
      <div class="metric-value">412</div>
      <div class="metric-label">Active validators in the delegation strategy</div>
      <div class="metric-change">+28 new validators</div>
    </div>
  </div>
</div>
</body>
</html>

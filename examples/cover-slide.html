<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Cover Slide — Marinade Brand Example</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Marinade Presentation Tokens */
  :root {
    --mn-dark: #151A1A;
    --mn-white: #FFFFFF;
    --mn-deep-teal: #194544;
    --mn-brand-teal: #308D8A;
    --mn-light-teal: #94C9C8;
    --mn-body-secondary: #323A38;
    --mn-near-white: #F3F3F3;
    --mn-slide-width: 1920px;
    --mn-slide-height: 1080px;
    --mn-margin-x: 80px;
    --mn-margin-y: 82px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: var(--mn-slide-width);
    height: var(--mn-slide-height);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: linear-gradient(180deg, #194544 0%, #0f2e2d 100%);
    color: var(--mn-white);
    padding: var(--mn-margin-y) var(--mn-margin-x);
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .wordmark {
    position: absolute;
    top: var(--mn-margin-y);
    left: var(--mn-margin-x);
    height: 40px;
    opacity: 0.9;
  }

  .hat-watermark {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 320px;
    opacity: 0.12;
  }

  .category {
    font-size: 24px;
    font-weight: 600;
    color: var(--mn-light-teal);
    letter-spacing: 0.02em;
    margin-bottom: 24px;
    font-variant-numeric: tabular-nums;
  }

  h1 {
    font-size: 72px;
    font-weight: 600;
    line-height: 1.1;
    max-width: 900px;
    text-wrap: balance;
  }

  .subtitle {
    font-size: 27px;
    font-weight: 400;
    color: var(--mn-light-teal);
    margin-top: 32px;
    max-width: 700px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<!--
  ARCHETYPE: 1. Title / Cover Slide
  - Dark background (deep-teal gradient)
  - Wordmark top-left, hat watermark top-right at 12% opacity
  - Category label in light-teal
  - Large statement headline, left-aligned
  - Optional subtitle in light-teal
-->
<div class="slide">
  <!-- In production, use: assets/logos/marinade-logo.svg -->
  <img class="wordmark" src="../assets/logos/marinade-logo.svg" alt="Marinade Finance" onerror="this.style.display='none'">
  <img class="hat-watermark" src="../assets/logos/marinade-hat.svg" alt="" aria-hidden="true" onerror="this.style.display='none'">

  <div class="category">Investor Update Q1 2026</div>
  <h1>Solana's leading liquid staking protocol</h1>
  <div class="subtitle">$2.1B TVL across 400+ validators with 8.81% APY</div>
</div>
</body>
</html>
